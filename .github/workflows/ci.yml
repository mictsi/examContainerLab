# =============================================================================
# CI: build the exam image and smoke-test it after every push to main.
#
#   1. Frees disk space on the runner (the image is large)
#   2. docker compose build   (~30-60 min on a GitHub-hosted runner)
#   3. docker compose up -d
#   4. scripts/smoke-test.sh  (API up, kernels present, hello notebooks run)
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune -af
          df -h /

      # The container user jovyan is uid 1000; checkout leaves results/ owned
      # by the runner user (uid 1001), which crashes the seed hook on startup.
      - name: Make results/ writable for the container user
        run: sudo chown -R 1000:100 results

      - name: Build exam image
        run: docker compose build

      - name: Start exam lab
        run: docker compose up -d

      - name: Smoke test
        run: ./scripts/smoke-test.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail 200

      - name: Teardown
        if: always()
        run: docker compose down -v
