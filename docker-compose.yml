# University exam lab — JupyterLab with Python, R, Julia, C, C++, Java, Perl, .NET 10
#
# Start:   docker compose up -d          then open http://localhost:8888/lab
# Token:   "exam-demo" — set in .env (or override: JUPYTER_TOKEN=secret docker compose up -d)
# Params:  .env holds JUPYTER_TOKEN and the container names
# Stop:    docker compose down
#
# Python-only variant (service examlab-python, port 8889):
#   docker compose --profile python up -d
services:
  examlab:
    build: .
    image: exam-jupyterlab:demo
    container_name: ${CONTAINER_NAME:-examlab}
    ports:
      - "8888:8888"
    # --- Rootless: the container never runs as root -------------------------
    # jovyan (uid 1000, gid 100 "users") is forced from the first process on;
    # the docker-stacks root-phase (NB_UID remapping, GRANT_SUDO) is unused.
    user: "1000:100"
    security_opt:
      - no-new-privileges:true   # blocks setuid/sudo escalation inside
    cap_drop:
      - ALL                      # non-root Jupyter + kernels need no capabilities
    environment:
      # Login token students enter in the browser
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-exam-demo}
      # Open the file browser in the writable results/ folder, not in $HOME —
      # keeps students out of the read-only exams/ mount by default.
      # (LabApp, not ServerApp: jupyter-lab overrides the latter with '/lab')
      NOTEBOOK_ARGS: --LabApp.default_url=/lab/tree/results
    volumes:
      # Exam sheets + instructions: read-only, students cannot modify them
      - ./exams:/home/jovyan/exams:ro
      # Student working copies / submissions: writable, survives the container
      - ./results:/home/jovyan/results
    restart: unless-stopped

  # --- Minimal Python-only lab (e.g. KTH BB1000) -----------------------------
  # Start:  docker compose --profile python up -d
  # Open:   http://localhost:8889/lab  (port 8889 so it can run next to the
  # full lab). Same volumes, token and hardening as the full service.
  examlab-python:
    profiles: ["python"]
    build:
      context: .
      dockerfile: Dockerfile.python
    image: exam-jupyterlab-python:demo
    container_name: ${CONTAINER_NAME_PYTHON:-examlab-python}
    ports:
      - "8889:8888"
    user: "1000:100"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-exam-demo}
      NOTEBOOK_ARGS: --LabApp.default_url=/lab/tree/results
    volumes:
      - ./exams:/home/jovyan/exams:ro
      - ./results:/home/jovyan/results
    restart: unless-stopped
    # --- Hardening for real exams (uncomment / adjust) -----------------------
    # mem_limit: 2g          # cap RAM per container
    # cpus: 2                # cap CPU
    # read_only: false       # NB: image needs writable $HOME for kernels
    # For "no internet during the exam", block egress on the host firewall or
    # run behind a filtering proxy; an `internal: true` docker network would
    # also break the published port 8888. See README.md.

  # --- Multi-user JupyterHub front-end (variant "hub") ------------------------
  # Start:  ./run.sh start hub    (or: docker compose --profile hub up -d)
  # Open:   http://localhost:8000 — accounts and per-user lab access come from
  # hub/userlist (username:password:lab[:admin]); no self-registration.
  # The hub spawns one lab container per student, so the lab images must be
  # built first (./run.sh build all) and the docker socket is mounted.
  hub:
    profiles: ["hub"]
    build:
      context: .
      dockerfile: Dockerfile.hub
    image: exam-jupyterhub:demo
    container_name: ${CONTAINER_NAME_HUB:-examhub}
    ports:
      - "8000:8000"
    environment:
      # host path of this repo — bind-mount source for spawned containers
      EXAM_HOST_DIR: ${EXAM_HOST_DIR:-${PWD}}
      HUB_CONNECT_IP: ${CONTAINER_NAME_HUB:-examhub}
      DOCKER_NETWORK: examnet
      FULL_IMAGE: exam-jupyterlab:demo
      PYTHON_IMAGE: exam-jupyterlab-python:demo
      # stop + remove student containers after this many idle seconds
      IDLE_TIMEOUT: ${IDLE_TIMEOUT:-3600}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # hub starts/stops student containers
      - ./hub:/srv/jupyterhub/hub:ro               # jupyterhub_config.py + userlist
      - ./results:/srv/jupyterhub/results          # pre-create per-user dirs (uid 1000)
      - hub-state:/srv/jupyterhub/state            # hub DB + cookie secret
    networks: [examnet]
    restart: unless-stopped

networks:
  # shared by the hub and the student containers it spawns
  # (fixed name so DockerSpawner finds it without the compose project prefix)
  examnet:
    name: examnet

volumes:
  hub-state:
